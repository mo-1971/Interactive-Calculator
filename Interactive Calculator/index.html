<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="calculator">
        <div class="display" id="display">0</div>
        <div class="buttons">
            <button class="btn btn-clear" id="clear">C</button>
            <button class="btn btn-operator" id="divide">/</button>
            <button class="btn btn-operator" id="multiply">*</button>
            <button class="btn btn-operator" id="subtract">-</button>
            
            <button class="btn btn-number">7</button>
            <button class="btn btn-number">8</button>
            <button class="btn btn-number">9</button>
            <button class="btn btn-operator btn-tall" id="add">+</button>
            
            <button class="btn btn-number">4</button>
            <button class="btn btn-number">5</button>
            <button class="btn btn-number">6</button>
            
            <button class="btn btn-number">1</button>
            <button class="btn btn-number">2</button>
            <button class="btn btn-number">3</button>
            <button class="btn btn-equal btn-tall" id="equals">=</button>
            
            <button class="btn btn-number btn-wide">0</button>
            <button class="btn btn-number" id="decimal">.</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
